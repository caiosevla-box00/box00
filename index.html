<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BOX 0.0">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<title>BOX 0.0</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:#080808; color:#f0f0f0; font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif; overflow:hidden; }

  /* SPLASH */
  #splash {
    position:fixed; inset:0; background:#080808;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; transition:opacity .6s ease;
  }
  #splash.fade-out { opacity:0; pointer-events:none; }

  .logo-wrap {
    animation: pulse 2s ease-in-out infinite;
  }
  .logo-wrap img {
    width:200px; height:200px; border-radius:50%;
    box-shadow: 0 0 40px rgba(90,191,0,.3);
  }
  @keyframes pulse {
    0%,100% { transform:scale(1); filter:drop-shadow(0 0 12px rgba(90,191,0,.4)); }
    50%      { transform:scale(1.04); filter:drop-shadow(0 0 28px rgba(90,191,0,.7)); }
  }

  .tagline {
    margin-top:28px;
    font-size:13px; font-weight:700; letter-spacing:4px; text-transform:uppercase;
    color:#5abf00; text-align:center; opacity:0;
    animation: fadeUp .8s ease .6s forwards;
  }
  .brand {
    margin-top:10px;
    font-family:'Bebas Neue','Impact',sans-serif;
    font-size:42px; letter-spacing:6px; color:#fff; text-align:center; opacity:0;
    animation: fadeUp .8s ease .9s forwards;
  }
  .sub {
    margin-top:6px;
    font-size:11px; letter-spacing:3px; color:#555; text-align:center; opacity:0;
    animation: fadeUp .8s ease 1.1s forwards;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* TOKEN GATE */
  #token-gate {
    position:fixed; inset:0; background:#080808;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:200; padding:32px;
  }
  #token-gate.show { display:flex; }

  .lock-icon { font-size:48px; margin-bottom:20px; }

  .gate-title {
    font-family:'Bebas Neue','Impact',sans-serif;
    font-size:32px; letter-spacing:4px; color:#5abf00; margin-bottom:6px;
  }
  .gate-sub {
    font-size:12px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:32px;
  }

  .token-input {
    width:100%; max-width:280px;
    background:#111; border:2px solid #333; border-radius:12px;
    padding:16px 20px; color:#f0f0f0;
    font-family:'Barlow Condensed',sans-serif; font-size:22px; letter-spacing:4px;
    text-align:center; outline:none; transition:border-color .2s;
  }
  .token-input:focus { border-color:#5abf00; }
  .token-input.error { border-color:#ff4444; animation:shake .3s ease; }
  @keyframes shake {
    0%,100%{ transform:translateX(0); }
    25%    { transform:translateX(-8px); }
    75%    { transform:translateX(8px); }
  }

  .btn-entrar {
    margin-top:16px; width:100%; max-width:280px;
    background:#5abf00; color:#080808; border:none; border-radius:12px;
    padding:16px; font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:800; letter-spacing:3px; text-transform:uppercase;
    cursor:pointer; transition:background .2s, transform .1s;
  }
  .btn-entrar:active { transform:scale(.97); background:#4aa800; }

  .gate-error {
    margin-top:12px; font-size:12px; color:#ff4444;
    letter-spacing:1px; opacity:0; transition:opacity .2s;
  }
  .gate-error.show { opacity:1; }

  .loader {
    width:40px; height:40px; border:3px solid #1a1a1a;
    border-top:3px solid #5abf00; border-radius:50%;
    animation:spin .8s linear infinite; margin-top:40px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo-wrap">
    <img src="icon.png" alt="BOX 0.0">
  </div>
  <div class="tagline">Estética Automotiva</div>
  <div class="brand">BOX 0.0</div>
  <div class="sub">Padrão de Qualidade</div>
  <div class="loader" style="margin-top:48px;"></div>
</div>

<!-- TOKEN GATE -->
<div id="token-gate">
  <div class="lock-icon">🔐</div>
  <div class="gate-title">BOX 0.0</div>
  <div class="gate-sub">Acesso Restrito</div>
  <input type="password" class="token-input" id="token-input"
    placeholder="••••••••" maxlength="20"
    onkeydown="if(event.key==='Enter')verificarToken()">
  <button class="btn-entrar" onclick="verificarToken()">ENTRAR</button>
  <div class="gate-error" id="gate-error">Código inválido. Tente novamente.</div>
</div>

<script>
const TOKEN_CORRETO = 'BOX2903';
const APP_URL = 'box00.html';
const STORAGE_KEY = 'box00_auth_v1';
const TOKEN_EXPIRY = 7 * 24 * 60 * 60 * 1000; // 7 dias

function tokenValido() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (!s) return false;
    if (Date.now() - s.ts > TOKEN_EXPIRY) { localStorage.removeItem(STORAGE_KEY); return false; }
    return s.ok === true;
  } catch(e) { return false; }
}

function salvarAuth() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ok: true, ts: Date.now() }));
}

function verificarToken() {
  const input = document.getElementById('token-input');
  const erro  = document.getElementById('gate-error');
  const val   = input.value.trim().toUpperCase();

  if (val === TOKEN_CORRETO) {
    salvarAuth();
    input.classList.remove('error');
    erro.classList.remove('show');
    entrar();
  } else {
    input.classList.add('error');
    erro.classList.add('show');
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

function entrar() {
  const splash = document.getElementById('splash');
  const gate   = document.getElementById('token-gate');
  splash.style.display = 'flex';
  splash.style.opacity = '1';
  gate.classList.remove('show');
  setTimeout(() => {
    window.location.href = APP_URL;
  }, 800);
}

// Inicialização
window.addEventListener('load', () => {
  setTimeout(() => {
    if (tokenValido()) {
      // Token válido — vai direto para o app
      entrar();
    } else {
      // Pede o token
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.style.display = 'none';
        document.getElementById('token-gate').classList.add('show');
        document.getElementById('token-input').focus();
      }, 700);
    }
  }, 2200); // tempo do splash
});
</script>
</body>
</html>
